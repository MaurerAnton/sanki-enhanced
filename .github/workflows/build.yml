name: Build Arch Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
      - name: Install deps
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            qt5-base cmake ninja git \
            unzip ncurses pkgconf gnupg

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build TUI
        run: |
          cmake -S tui -B build-tui -DCMAKE_BUILD_TYPE=Release
          cmake --build build-tui -j$(nproc)

      - name: Create pkgdir
        run: |
          mkdir -p pkg/sanki-enhanced/usr/bin
          cp build-tui/sanki-tui pkg/sanki-enhanced/usr/bin/sanki-tui

      - name: Package .pkg.tar.zst
        run: |
          cd pkg/sanki-enhanced
          tar --zstd -cf ../../sanki-enhanced-${GITHUB_REF_NAME#v}-1-x86_64.pkg.tar.zst .

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | base64 -d | gpg --batch --import
          GPGKEY=$(gpg --list-secret-keys --with-colons | grep '^sec:' -A1 | grep '^fpr:' | head -1 | cut -d: -f10)
          echo "GPGKEY=$GPGKEY" >> $GITHUB_ENV

      - name: Sign packages
        run: |
          # ASCII-armored signatures (.asc)
          gpg --batch --yes --pinentry-mode loopback --passphrase '' \
            --detach-sign --armor \
            --default-key "$GPGKEY" \
            sanki-enhanced-${GITHUB_REF_NAME#v}-1-x86_64.pkg.tar.zst
          gpg --batch --yes --pinentry-mode loopback --passphrase '' \
            --detach-sign --armor \
            --default-key "$GPGKEY" \
            build-tui/sanki-tui
          # Binary signatures (.sig) for pacman
          gpg --batch --yes --pinentry-mode loopback --passphrase '' \
            --detach-sign \
            --default-key "$GPGKEY" \
            sanki-enhanced-${GITHUB_REF_NAME#v}-1-x86_64.pkg.tar.zst
          gpg --batch --yes --pinentry-mode loopback --passphrase '' \
            --detach-sign \
            --default-key "$GPGKEY" \
            build-tui/sanki-tui
          mv build-tui/sanki-tui.sig sanki-tui.sig

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sanki-enhanced-arch-packages
          path: |
            sanki-enhanced-*.pkg.tar.zst
            sanki-enhanced-*.pkg.tar.zst.asc
            sanki-enhanced-*.pkg.tar.zst.sig
            build-tui/sanki-tui
            build-tui/sanki-tui.asc
            sanki-tui.sig

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sanki-enhanced-*.pkg.tar.zst
            sanki-enhanced-*.pkg.tar.zst.asc
            sanki-enhanced-*.pkg.tar.zst.sig
            build-tui/sanki-tui
            build-tui/sanki-tui.asc
            sanki-tui.sig
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
