name: Build Arch Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
      - name: Install deps
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm qt5-base cmake ninja git unzip ncurses pkgconf gnupg

      - uses: actions/checkout@v4

      - name: Build TUI
        run: |
          cmake -S tui -B build-tui -DCMAKE_BUILD_TYPE=Release
          cmake --build build-tui -j$(nproc)
          strip build-tui/sanki-tui

      - name: Create Arch package
        run: |
          VER="${GITHUB_REF_NAME#v}"
          [[ -z "$VER" || "$VER" == "$GITHUB_REF_NAME" ]] && VER="0.0.0"
          DIR="sanki-enhanced-${VER}-1-x86_64"
          mkdir -p "$DIR/usr/bin"
          cp build-tui/sanki-tui "$DIR/usr/bin/sanki-tui"

          BUILDDATE=$(date -u +%s)
          SIZE=$(du -sb "$DIR" | cut -f1)

          cat > "$DIR/.PKGINFO" << PKGEOF
pkgname = sanki-enhanced
pkgver = ${VER}-1
pkgdesc = Small Anki flashcard app with terminal (TUI) interface
url = https://github.com/MaurerAnton/sanki-enhanced
builddate = ${BUILDDATE}
packager = Sanki CI <sanki@maureranton.com>
size = ${SIZE}
arch = x86_64
license = MIT
PKGEOF

          bsdtar -czf "$DIR/.MTREE" --format=mtree \
            --options='!all,use-set,type,uid,gid,mode,time,size,md5,sha256,link' \
            -C "$DIR" .PKGINFO usr

          PKG="sanki-enhanced-${VER}-1-x86_64.pkg.tar.zst"
          bsdtar --zstd -cf "$PKG" "$DIR"
          rm -rf "$DIR"
          ls -la "$PKG"

      - name: Sign (if key available)
        run: |
          if [[ -n "${{ secrets.GPG_PRIVATE_KEY }}" ]]; then
            echo "${{ secrets.GPG_PRIVATE_KEY }}" | base64 -d | gpg --batch --import
            GPGKEY=$(gpg --list-secret-keys --with-colons | grep '^sec:' -A1 | grep '^fpr:' | head -1 | cut -d: -f10)
            for f in sanki-enhanced-*.pkg.tar.zst build-tui/sanki-tui; do
              gpg --batch --yes --pinentry-mode loopback --passphrase '' \
                --detach-sign --default-key "$GPGKEY" "$f"
            done
            mv build-tui/sanki-tui.sig sanki-tui.sig 2>/dev/null || true
          else
            echo "No GPG key set, skipping signing"
          fi

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: |
            sanki-enhanced-*.pkg.tar.zst
            sanki-enhanced-*.pkg.tar.zst.sig
            sanki-tui
            sanki-tui.sig

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sanki-enhanced-*.pkg.tar.zst
            sanki-enhanced-*.pkg.tar.zst.sig
            sanki-tui
            sanki-tui.sig
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
