name: Build Arch Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
      - name: Install deps
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm qt5-base cmake ninja git unzip ncurses pkgconf gnupg

      - uses: actions/checkout@v4

      - name: Build TUI
        run: |
          cmake -S tui -B build-tui -DCMAKE_BUILD_TYPE=Release
          cmake --build build-tui -j$(nproc)
          strip build-tui/sanki-tui

      - name: Package
        run: |
          VER="${GITHUB_REF_NAME#v}"
          if [ -z "$VER" ] || [ "$VER" = "$GITHUB_REF_NAME" ]; then VER="0.0.0"; fi
          DIR="sanki-enhanced-${VER}-1-x86_64"
          mkdir -p "${DIR}/usr/bin"
          cp build-tui/sanki-tui "${DIR}/usr/bin/sanki-tui"
          SIZE=$(du -sb "${DIR}" | cut -f1)
          printf 'pkgname = sanki-enhanced\npkgver = %s-1\npkgdesc = Terminal SRS flashcard app (Anki compatible)\nurl = https://github.com/MaurerAnton/sanki-enhanced\narch = x86_64\nlicense = MIT\nbuilddate = %s\nsize = %s\npackager = Sanki CI <sanki@maureranton.com>\n' "${VER}" "$(date -u +%s)" "${SIZE}" > "${DIR}/.PKGINFO"
          bsdtar -czf "${DIR}/.MTREE" --format=mtree --options='!all,use-set,type,uid,gid,mode,time,size,md5,sha256,link' -C "${DIR}" .PKGINFO usr
          PKG="sanki-enhanced-${VER}-1-x86_64.pkg.tar.zst"
          bsdtar --zstd -cf "${PKG}" "${DIR}"
          rm -rf "${DIR}"
          ls -la "${PKG}"

      - name: Sign
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | base64 -d | gpg --batch --import
          KEY=$(gpg --list-secret-keys --with-colons | grep '^sec:' -A1 | grep '^fpr:' | head -1 | cut -d: -f10)
          for f in sanki-enhanced-*.pkg.tar.zst build-tui/sanki-tui; do
            gpg --batch --yes --pinentry-mode loopback --passphrase '' --detach-sign --default-key "$KEY" "$f"
          done
          mv build-tui/sanki-tui.sig sanki-tui.sig 2>/dev/null || true

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: |
            sanki-enhanced-*.pkg.tar.zst
            sanki-enhanced-*.pkg.tar.zst.sig
            sanki-tui
            sanki-tui.sig

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sanki-enhanced-*.pkg.tar.zst
            sanki-enhanced-*.pkg.tar.zst.sig
            sanki-tui
            sanki-tui.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
