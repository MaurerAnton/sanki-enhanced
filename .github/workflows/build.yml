name: Build Arch Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
      - name: Install deps
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            qt5-base cmake ninja git \
            unzip ncurses pkgconf

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build TUI
        run: |
          cmake -S tui -B build-tui -DCMAKE_BUILD_TYPE=Release
          cmake --build build-tui -j$(nproc)
          strip build-tui/sanki-tui

      - name: Create valid Arch package
        run: |
          VER="${GITHUB_REF_NAME#v}"
          PKG="sanki-enhanced-${VER}-1-x86_64.pkg.tar.zst"
          DIR="pkg/sanki-enhanced-${VER}-1-x86_64"

          # Build dir layout
          mkdir -p "$DIR/usr/bin"
          cp build-tui/sanki-tui "$DIR/usr/bin/sanki-tui"

          # Required package metadata
          cat > "$DIR/.PKGINFO" << EOF
# Generated by CI
pkgname = sanki-enhanced
pkgver = ${VER}-1
pkgdesc = Small Anki flashcard app with terminal (TUI) interface
url = https://github.com/MaurerAnton/sanki-enhanced
builddate = $(date -u +%s)
packager = Sanki CI <sanki@maureranton.com>
size = $(du -sb "$DIR" | cut -f1)
arch = x86_64
license = MIT
EOF

          # Create .MTREE (pacman uses this for integrity)
          cd "$DIR"
          bsdtar -czf .MTREE --format=mtree \
            --options='!all,use-set,type,uid,gid,mode,time,size,md5,sha256,link' \
            .PKGINFO usr
          cd ../..

          # Package
          cd pkg
          bsdtar --zstd -cf "../$PKG" "sanki-enhanced-${VER}-1-x86_64"
          cd ..
          rm -rf pkg
          ls -la "$PKG"

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | base64 -d | gpg --batch --import
          GPGKEY=$(gpg --list-secret-keys --with-colons | grep '^sec:' -A1 | grep '^fpr:' | head -1 | cut -d: -f10)
          echo "GPGKEY=$GPGKEY" >> $GITHUB_ENV

      - name: Sign packages
        run: |
          PKG=$(ls sanki-enhanced-*.pkg.tar.zst)
          gpg --batch --yes --pinentry-mode loopback --passphrase '' \
            --detach-sign --default-key "$GPGKEY" "$PKG"
          gpg --batch --yes --pinentry-mode loopback --passphrase '' \
            --detach-sign --armor --default-key "$GPGKEY" "$PKG"
          gpg --batch --yes --pinentry-mode loopback --passphrase '' \
            --detach-sign --default-key "$GPGKEY" build-tui/sanki-tui
          gpg --batch --yes --pinentry-mode loopback --passphrase '' \
            --detach-sign --armor --default-key "$GPGKEY" build-tui/sanki-tui
          mv build-tui/sanki-tui.sig sanki-tui.sig
          mv build-tui/sanki-tui.asc sanki-tui.asc

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sanki-enhanced-arch-packages
          path: |
            sanki-enhanced-*.pkg.tar.zst
            sanki-enhanced-*.pkg.tar.zst.sig
            sanki-tui
            sanki-tui.sig

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sanki-enhanced-*.pkg.tar.zst
            sanki-enhanced-*.pkg.tar.zst.sig
            sanki-tui
            sanki-tui.sig
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
